services:
  # NGINX Load Balancer
  nginx-lb:
    image: nginx:alpine
    container_name: elearning_nginx_lb
    ports:
      - "8888:80"
      - "8880:8880"
      - "8878:8878"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - mysql
      - eureka

  # PostgreSQL for multiple services
  postgres:
    image: postgres:15-alpine
    container_name: elearning_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: notification_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres:/docker-entrypoint-initdb.d
    networks:
      - elearning_net

  # MySQL for multiple services
  mysql:
    image: mysql:8.0
    container_name: elearning_mysql
    environment:
      MYSQL_ROOT_PASSWORD: adminpassword
      MYSQL_DATABASE: feedback_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: adminpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-mysql:/docker-entrypoint-initdb.d
    networks:
      - elearning_net

  # Keycloak for Identity and Access Management
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: elearning_keycloak
    user: root
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_THEME_CACHE_TEMPLATES: "false"
      KC_THEME_CACHE_THEMES: "false"
      KC_THEME_STATIC_MAX_AGE: "0"
    command: start-dev
    ports:
      - "18080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data/h2
      - ./keycloak-theme/premium-elearning:/opt/keycloak/themes/premium-elearning
    networks:
      - elearning_net

  # Eureka Server for Service Discovery
  eureka:
    image: steeltoeoss/eureka-server
    container_name: elearning_eureka
    ports:
      - "8761:8761"
    networks:
      - elearning_net

  # phpMyAdmin for MySQL Database Management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: elearning_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: adminpassword
    ports:
      - "8085:80"
    depends_on:
      - mysql
    networks:
      - elearning_net

volumes:
  postgres_data:
  mysql_data:
  keycloak_data:


networks:
  elearning_net:
    driver: bridge

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format with load balancing info
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '| upstream: $upstream_addr | response_time: $upstream_response_time | instance: $upstream_status';

    access_log  /var/log/nginx/access.log  main;

    # Performance settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Gzip compression
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ============================================
    # UPSTREAM DEFINITIONS - MULTI-INSTANCE LOAD BALANCING
    # ============================================

    # API Gateway Load Balancing (Ports 3000, 3010)
    upstream api_gateway_cluster {
        least_conn;
        server host.docker.internal:3000 weight=3 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3010 weight=3 max_fails=3 fail_timeout=30s backup;
    }

    # User Service Load Balancing (Ports 3001, 3011)
    upstream user_service_cluster {
        least_conn;
        server host.docker.internal:3001 weight=3 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3011 weight=3 max_fails=3 fail_timeout=30s;
    }

    # Course Service Load Balancing (Ports 3002, 3012)
    upstream course_service_cluster {
        least_conn;
        server host.docker.internal:3002 weight=3 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3012 weight=3 max_fails=3 fail_timeout=30s;
    }

    # Progress Service Load Balancing (Ports 3003, 3013)
    upstream progress_service_cluster {
        least_conn;
        server host.docker.internal:3003 weight=3 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3013 weight=3 max_fails=3 fail_timeout=30s;
    }

    # Notification HTTP Service Load Balancing (Ports 3005, 3015)
    upstream notification_service_cluster {
        least_conn;
        server host.docker.internal:3005 weight=3 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3015 weight=3 max_fails=3 fail_timeout=30s;
    }

    # Feedback Service Load Balancing (Ports 3006, 3016)
    upstream feedback_service_cluster {
        least_conn;
        server host.docker.internal:3006 weight=3 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3016 weight=3 max_fails=3 fail_timeout=30s;
    }

    # Frontend React App Load Balancing (Port 5173)
    upstream frontend_cluster {
        least_conn;
        server host.docker.internal:5173 weight=3 max_fails=3 fail_timeout=30s;
    }

    # ============================================
    # SERVER BLOCKS - VIRTUAL HOSTS
    # ============================================

    # Main entry point - Load Balance API Gateway
    server {
        listen       80;
        listen       [::]:80;
        server_name  localhost;

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Nginx Status (optional - for monitoring)
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }

        # Main API routing through API Gateway cluster
        location /api/ {
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Direct service routing (bypassing API Gateway for internal use)
        location /api/users {
            proxy_pass http://user_service_cluster/api/users;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/courses {
            proxy_pass http://course_service_cluster/api/courses;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/progress {
            proxy_pass http://progress_service_cluster/api/progress;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/feedbacks {
            proxy_pass http://feedback_service_cluster/api/feedbacks;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /feedbacks {
            proxy_pass http://feedback_service_cluster/api/feedbacks;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/notifications {
            proxy_pass http://notification_service_cluster/api/notifications;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend serving
        location / {
            proxy_pass http://frontend_cluster/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }

    # ============================================
    # INTERNAL LOAD BALANCER (Port 8880)
    # For inter-service communication
    # ============================================
    server {
        listen       8880;
        listen       [::]:8880;
        server_name  internal-lb;

        # Direct access to specific services for internal microservices
        location /users {
            proxy_pass http://user_service_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /courses {
            proxy_pass http://course_service_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /progress {
            proxy_pass http://progress_service_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /feedbacks {
            proxy_pass http://feedback_service_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /notifications {
            proxy_pass http://notification_service_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # API Gateway direct access
        location /gateway {
            proxy_pass http://api_gateway_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "internal-lb-healthy\n";
            add_header Content-Type text/plain;
        }
    }
}

# ============================================
# STREAM BLOCK - TCP LOAD BALANCING
# ============================================

stream {
    # Notification TCP Microservice Load Balancing (Ports 8877, 8879)
    upstream notification_tcp_cluster {
        least_conn;
        server host.docker.internal:8877 weight=3 max_fails=3 fail_timeout=30s;
        server host.docker.internal:8879 weight=3 max_fails=3 fail_timeout=30s;
    }

    # TCP Load Balancer for Notification Service
    server {
        listen     8878;
        proxy_pass notification_tcp_cluster;
        proxy_timeout 3s;
        proxy_connect_timeout 1s;
    }
}

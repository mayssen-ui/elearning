      - EUREKA_INSTANCE_PORT=3007
    volumes:
      - ../backend/spring-boot-services/analytics-service/target/analytics-service-1.0.0.jar:/app/analytics-service.jar:ro
    working_dir: /app
    command: ["sh", "-c", "sleep 60 && java -jar analytics-service.jar"]
    ports:
      - "3007:3007"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  analytics-service-2:
    image: eclipse-temurin:17-jdk-alpine
    container_name: analytics_service_instance_2
    environment:
      - SERVER_PORT=3023
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=analytics-service-2
      - EUREKA_INSTANCE_HOSTNAME=analytics_service_instance_2
      - EUREKA_INSTANCE_PORT=3023
    volumes:
      - ../backend/spring-boot-services/analytics-service/target/analytics-service-1.0.0.jar:/app/analytics-service.jar:ro
    working_dir: /app
    command: ["sh", "-c", "sleep 65 && java -jar analytics-service.jar --server.port=3023"]
    ports:
      - "3023:3023"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------- FRONTEND INSTANCE -----------
  frontend:
    image: node:18-alpine
    container_name: frontend_instance
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host"]
    ports:
      - "5173:5173"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------- H2 DATABASE SERVER FOR COURSE (TCP MODE) -----------
  h2-server:
    image: oscarfonts/h2:latest
    container_name: h2_server
    restart: unless-stopped
    environment:
      - H2_OPTIONS=-tcp -tcpAllowOthers -tcpPort 1522 -web -webPort 8083 -ifNotExists
    ports:
      - "1522:1522"
      - "8083:8083"  # H2 Console for Course
    volumes:
      - h2_data:/opt/h2-data
    networks:
      - elearning_net

  # ----------- H2 DATABASE SERVER FOR PROGRESS (TCP MODE) -----------
  h2-server-progress:
    image: oscarfonts/h2:latest
    container_name: h2_server_progress
    restart: unless-stopped
    environment:
      - H2_OPTIONS=-tcp -tcpAllowOthers -tcpPort 1523 -web -webPort 8084 -ifNotExists
    ports:
      - "1523:1523"
      - "8084:8084"  # H2 Console for Progress
    volumes:
      - h2_data_progress:/opt/h2-data
    networks:
      - elearning_net

  # ----------- H2 DATABASE SERVER FOR CHAT (TCP MODE) -----------
  h2-server-chat:
    image: oscarfonts/h2:latest
    container_name: h2_server_chat
    restart: unless-stopped
    environment:
      - H2_OPTIONS=-tcp -tcpAllowOthers -tcpPort 1524 -web -webPort 8086 -ifNotExists
    ports:
      - "1524:1524"
      - "8086:8086"  # H2 Console for Chat
    volumes:
      - h2_data_chat:/opt/h2-data
    networks:
      - elearning_net

volumes:
  postgres_data:
  mysql_data:
  keycloak_data:
  notification_node_modules:
  notification_node_modules_2:
  frontend_node_modules:
  course_data_shared:
  user_h2_data:
  h2_data:
  h2_data_progress:
  h2_data_chat:

networks:
  elearning_net:
    driver: bridge

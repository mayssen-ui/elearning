      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=feedback-service-2
      - EUREKA_INSTANCE_HOSTNAME=feedback_service_instance_2
    command: ["sh", "-c", "sleep 65 && java -jar /app.jar --server.port=3054 --spring.datasource.url=jdbc:mysql://mysql:3306/feedback_db?createDatabaseIfNotExist=true --spring.datasource.username=root --spring.datasource.password=adminpassword"]
    ports:
      - "3054:3054"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------- NOTIFICATION SERVICE INSTANCES (NestJS) -----------
  notification-service-1:
    image: node:18-alpine
    container_name: notification_service_instance_1
    restart: unless-stopped
    user: root
    working_dir: /app
    volumes:
      - ../backend/apps/notification-microservice:/app
      - notification_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run build && npm start"]
    ports:
      - "3005:3005"
      - "8877:8877"
    environment:
      - HTTP_PORT=3005
      - TCP_PORT=8877
      - DB_HOST=host.docker.internal
      - DB_PORT=5433
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=notification_db
      - EUREKA_HOST=host.docker.internal
      - EUREKA_PORT=8761
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=notification-service-1
      - EUREKA_INSTANCE_HOSTNAME=notification_service_instance_1
      - EUREKA_INSTANCE_PORT=3005
      - EUREKA_INSTANCE_IP=host.docker.internal
      - COURSE_SERVICE_URL=http://host.docker.internal:3002
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  notification-service-2:
    image: node:18-alpine
    container_name: notification_service_instance_2
    restart: unless-stopped
    user: root
    working_dir: /app
    volumes:
      - ../backend/apps/notification-microservice:/app
      - notification_node_modules_2:/app/node_modules
    command: ["sh", "-c", "npm install && npm run build && HTTP_PORT=3015 TCP_PORT=8879 EUREKA_INSTANCE_INSTANCE_ID=notification-service-2 npm start"]
    ports:
      - "3015:3015"
      - "8879:8879"
    environment:
      - HTTP_PORT=3015
      - TCP_PORT=8879
      - DB_HOST=host.docker.internal
      - DB_PORT=5433
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=notification_db
      - EUREKA_HOST=host.docker.internal
      - EUREKA_PORT=8761
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=notification-service-2
      - EUREKA_INSTANCE_HOSTNAME=notification_service_instance_2
      - EUREKA_INSTANCE_PORT=3015
      - EUREKA_INSTANCE_IP=host.docker.internal
      - COURSE_SERVICE_URL=http://host.docker.internal:3002

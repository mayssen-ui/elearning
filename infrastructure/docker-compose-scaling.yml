# ============================================
# DOCKER COMPOSE - MULTI-INSTANCE SCALING
# ============================================
# Ce fichier permet de lancer plusieurs instances de chaque microservice
# pour tester le load balancing et la scalabilité horizontale.
# 
# NOUVEAUX PORTS UTILISÉS (vérifiés - aucun conflit):
# - 3010-3016: Instances supplémentaires des services Spring Boot
# - 8879: Instance TCP supplémentaire du Notification Service
# ============================================

version: '3.8'

services:
  # ============================================
  # NGINX LOAD BALANCER (Instance principale)
  # ============================================
  nginx-lb:
    image: nginx:alpine
    container_name: elearning_nginx_lb
    ports:
      - "8888:80"
      - "8880:8080"
      - "8878:8878"
    volumes:
      - ./nginx/nginx-scaling.conf:/etc/nginx/nginx.conf:ro
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - mysql
      - eureka

  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: elearning_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: notification_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres:/docker-entrypoint-initdb.d
    networks:
      - elearning_net

  mysql:
    image: mysql:8.0
    container_name: elearning_mysql
    environment:
      MYSQL_ROOT_PASSWORD: adminpassword
      MYSQL_DATABASE: feedback_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: adminpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-mysql:/docker-entrypoint-initdb.d
    networks:
      - elearning_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padminpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: elearning_keycloak
    user: root
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_THEME_CACHE_TEMPLATES: "false"
      KC_THEME_CACHE_THEMES: "false"
      KC_THEME_STATIC_MAX_AGE: "0"
    command: start-dev
    ports:
      - "18080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data/h2
      - ./keycloak-theme/premium-elearning:/opt/keycloak/themes/premium-elearning
    networks:
      - elearning_net

  eureka:
    image: steeltoeoss/eureka-server
    container_name: elearning_eureka
    ports:
      - "8761:8761"
    networks:
      - elearning_net

  # ----------- CONFIG SERVER -----------
  config-server:
    build:
      context: ../backend/spring-boot-services/config-server
      dockerfile: Dockerfile
    container_name: config_server
    restart: unless-stopped
    depends_on:
      - eureka
    environment:
      - SERVER_PORT=8889
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=config-server
      - EUREKA_INSTANCE_HOSTNAME=config_server
    volumes:
      - ./config-repo:/config-repo:ro
    ports:
      - "8889:8889"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: elearning_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: adminpassword
    ports:
      - "8085:80"
    depends_on:
      - mysql
    networks:
      - elearning_net

  # ============================================
  # MULTIPLE SERVICE INSTANCES FOR LOAD BALANCING
  # ============================================

  # ----------- USER SERVICE INSTANCES -----------
  user-service-1:
    image: eclipse-temurin:17-jdk-alpine
    container_name: user_service_instance_1
    restart: unless-stopped
    environment:
      - SERVER_PORT=3004
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=user-service-1
      - EUREKA_INSTANCE_HOSTNAME=user_service_instance_1
      - SPRING_DATASOURCE_URL=jdbc:h2:file:./data/userdb1;DB_CLOSE_ON_EXIT=FALSE
    volumes:
      - ../backend/spring-boot-services/user-service/target/user-service-1.0.0.jar:/app/user-service.jar:ro
      - user_h2_data:/app/data
    working_dir: /app
    command: ["sh", "-c", "sleep 30 && java -jar user-service.jar"]
    ports:
      - "3004:3004"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  user-service-2:
    image: eclipse-temurin:17-jdk-alpine
    container_name: user_service_instance_2
    restart: unless-stopped
    environment:
      - SERVER_PORT=3017
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=user-service-2
      - EUREKA_INSTANCE_HOSTNAME=user_service_instance_2
      - SPRING_DATASOURCE_URL=jdbc:h2:file:./data/userdb2;DB_CLOSE_ON_EXIT=FALSE
    volumes:
      - ../backend/spring-boot-services/user-service/target/user-service-1.0.0.jar:/app/user-service.jar:ro
      - user_h2_data:/app/data
    working_dir: /app
    command: ["sh", "-c", "sleep 35 && java -jar user-service.jar --server.port=3017"]
    ports:
      - "3017:3017"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------- COURSE SERVICE INSTANCES -----------
  course-service-1:
    image: eclipse-temurin:17-jdk-alpine
    container_name: course_service_instance_1
    restart: unless-stopped
    depends_on:
      - h2-server
    environment:
      - SERVER_PORT=3002
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=course-service-1
      - EUREKA_INSTANCE_HOSTNAME=course_service_instance_1
      - SPRING_DATASOURCE_URL=jdbc:h2:tcp://h2-server:1522/coursedb
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    volumes:
      - ../backend/spring-boot-services/course-service/target/course-service-1.0.0.jar:/app/course-service.jar:ro
    working_dir: /app
    command: ["sh", "-c", "sleep 50 && java -jar course-service.jar"]
    ports:
      - "3002:3002"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  course-service-2:
    image: eclipse-temurin:17-jdk-alpine

      - ../backend/spring-boot-services/api-gateway/target/api-gateway-1.0.0.jar:/app/api-gateway.jar:ro
    working_dir: /app
    command: ["java", "-jar", "api-gateway.jar"]
    ports:
      - "3000:3000"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api-gateway-2:

  # ----------- FEEDBACK SERVICE INSTANCES -----------
  feedback-service-1:
    build:
      context: ../backend/spring-boot-services/feedback-service
      dockerfile: Dockerfile
    container_name: feedback_service_instance_1
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SERVER_PORT=3044
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://host.docker.internal:8761/eureka/
      - EUREKA_INSTANCE_INSTANCE_ID=feedback-service-1
      - EUREKA_INSTANCE_HOSTNAME=feedback_service_instance_1
    command: ["sh", "-c", "sleep 60 && java -jar /app.jar --server.port=3044 --spring.datasource.url=jdbc:mysql://mysql:3306/feedback_db?createDatabaseIfNotExist=true --spring.datasource.username=root --spring.datasource.password=adminpassword"]
    ports:
      - "3044:3044"
    networks:
      - elearning_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  feedback-service-2:

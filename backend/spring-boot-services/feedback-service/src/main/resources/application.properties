server.port=3034
spring.application.name=feedback-service

# MySQL Database Configuration (WAMP phpMyAdmin)
spring.datasource.url=jdbc:mysql://localhost:3306/feedback_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Execute schema.sql at startup (only if needed)
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql

# Spring Cloud Config Client
spring.config.import=optional:configserver:
spring.cloud.config.uri=http://host.docker.internal:8889
spring.cloud.config.fail-fast=false

# Eureka Client Configuration
eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=http://host.docker.internal:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

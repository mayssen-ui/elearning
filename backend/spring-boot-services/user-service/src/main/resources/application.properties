server.port=3104
spring.application.name=user-service

# Keycloak Configuration (Local Development)
keycloak.auth-server-url=http://host.docker.internal:18080
keycloak.realm=elearning
keycloak.admin-username=admin
keycloak.admin-password=admin
keycloak.admin-client-secret=w3z12Omxdoec2UXkR5TIW2wUF3JiMd0h

# H2 Database Configuration (FICHIER PERSISTANT)
spring.datasource.url=jdbc:h2:file:./data/userdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
# Spring Cloud Config Client
spring.config.import=optional:configserver:
spring.cloud.config.uri=http://host.docker.internal:8889
spring.cloud.config.fail-fast=false

# Eureka Client Configuration
eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=http://host.docker.internal:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

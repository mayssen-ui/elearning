server:
  port: 8889

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        native:
          search-locations: file:/config-repo
        # For Git backend (alternative):
        # git:
        #   uri: https://github.com/yourusername/elearning-config-repo
        #   clone-on-start: true
  profiles:
    active: native

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

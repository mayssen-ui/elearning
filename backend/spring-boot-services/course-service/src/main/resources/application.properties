server.port=3002
spring.application.name=course-service

# H2 Database Configuration (TCP MODE - for multi-instance)
# Override with environment variables for Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:tcp://localhost:1522/coursedb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Spring Cloud Config Client
spring.config.import=optional:configserver:
spring.cloud.config.uri=http://host.docker.internal:8889
spring.cloud.config.fail-fast=false

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=http://host.docker.internal:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# OpenFeign Configuration
spring.cloud.openfeign.client.config.default.connectTimeout=10000
spring.cloud.openfeign.client.config.default.readTimeout=10000
spring.cloud.openfeign.client.config.default.loggerLevel=full

# Activer OpenFeign
feign.hystrix.enabled=true

# Logging OpenFeign
logging.level.com.elearning.courseservice.client=DEBUG

# File Upload Configuration
file.upload-dir=./uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
